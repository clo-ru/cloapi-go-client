name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l $(git ls-files '*.go' | grep -v clo_gen.go))
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-ed:"
            echo "$unformatted"
            exit 1
          fi

      - name: Test
        run: go test -race -cover ./...