name: Auto-update Go SDK

on:
  schedule:
    - cron: '0 0 * * *'   # daily at 00:00 UTC
  workflow_dispatch:

jobs:
  regenerate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install oapi-codegen
        run: |
          go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Regenerate SDK
        run: make all

      - name: Verify build and tests
        run: |
          go build ./...
          go vet ./...
          go test ./...

      - name: Check for generated changes
        id: git_status
        run: |
          if [ -n "$(git status --porcelain clo_gen.go go.mod go.sum)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No generation changes detected."
          fi

      - name: Commit and push
        if: steps.git_status.outputs.changed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add clo_gen.go go.mod go.sum
          git commit -m "chore: auto-update generated client [skip ci]"
          git push

      - name: Release patch version
        if: success() && github.ref == 'refs/heads/main' && steps.git_status.outputs.changed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          make release